<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EDEN — Bibliothèque</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --gold: #C9A84C; --gold-light: #F0D080; --bg-deep: #0E0828; --border-purple: #2A1A6A; }
    html, body { min-height:100%; background:radial-gradient(ellipse at top,#2A1B6A 0%,#160D42 55%,#0E0828 100%); color:#fff; font-family:'Inter',sans-serif; font-weight:300; padding-bottom:40px; }

    nav { position:sticky; top:0; z-index:100; background:rgba(14,8,40,0.92); backdrop-filter:blur(12px); border-bottom:0.5px solid var(--border-purple); padding:0 1.5rem; height:54px; display:flex; align-items:center; justify-content:space-between; }
    .nav-left { display:flex; align-items:center; gap:14px; }
    .nav-back { width:32px; height:32px; border-radius:50%; background:var(--bg-deep); border:0.5px solid var(--border-purple); display:flex; align-items:center; justify-content:center; cursor:pointer; text-decoration:none; transition:border-color 0.2s; }
    .nav-back:hover { border-color:var(--gold); }
    .nav-back svg { width:14px; height:14px; stroke:rgba(160,140,200,0.7); fill:none; stroke-width:2; }
    .nav-logo { font-family:'Cinzel',serif; font-size:18px; font-weight:400; letter-spacing:5px; color:var(--gold); text-decoration:none; }
    .nav-icon { width:32px; height:32px; border-radius:50%; background:var(--bg-deep); border:0.5px solid var(--border-purple); display:flex; align-items:center; justify-content:center; cursor:pointer; text-decoration:none; transition:border-color 0.2s; }
    .nav-icon:hover { border-color:var(--gold); }
    .nav-icon svg { width:15px; height:15px; stroke:rgba(160,140,200,0.7); fill:none; stroke-width:1.5; }
    .nav-avatar { width:32px; height:32px; border-radius:50%; border:1.5px solid var(--gold); object-fit:cover; }

    /* NOT SIGNED IN */
    #not-signed-in { display:none; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; text-align:center; padding:2rem; gap:1.5rem; }
    .nsi-logo { font-family:'Cinzel',serif; font-size:32px; color:var(--gold); letter-spacing:8px; }
    .nsi-text { font-size:13px; color:rgba(255,255,255,0.5); line-height:1.7; max-width:300px; }
    .google-btn { display:flex; align-items:center; justify-content:center; gap:10px; padding:13px 28px; border-radius:8px; background:#fff; color:#333; font-size:13px; font-family:'Inter',sans-serif; font-weight:500; cursor:pointer; border:none; }
    .google-btn svg { width:18px; height:18px; }

    /* LOADING */
    #loading { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; gap:16px; }
    .spinner { width:32px; height:32px; border:2px solid var(--border-purple); border-top-color:var(--gold); border-radius:50%; animation:spin 0.8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .loading-text { font-size:11px; color:rgba(160,140,200,0.6); letter-spacing:3px; text-transform:uppercase; }

    /* MAIN */
    #main { display:none; max-width:700px; margin:0 auto; padding:2rem 1.5rem; }
    .page-title { font-family:'Cinzel',serif; font-size:11px; letter-spacing:4px; color:var(--gold); text-transform:uppercase; margin-bottom:0.5rem; opacity:0.8; }
    .page-sub { font-size:12px; color:rgba(255,255,255,0.35); margin-bottom:2rem; }

    /* TABS */
    .tabs { display:flex; gap:6px; margin-bottom:1.5rem; }
    .tab { padding:8px 18px; border-radius:20px; font-size:11px; letter-spacing:1px; cursor:pointer; border:0.5px solid var(--border-purple); background:transparent; color:rgba(160,140,200,0.7); font-family:'Inter',sans-serif; transition:all 0.2s; }
    .tab.on { background:rgba(201,168,76,0.1); border-color:var(--gold); color:var(--gold); }

    /* BOOK GRID */
    .books-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:14px; }
    .book-card { border-radius:10px; overflow:hidden; cursor:pointer; border:0.5px solid var(--border-purple); transition:border-color 0.2s, transform 0.2s; text-decoration:none; display:block; }
    .book-card:hover { border-color:rgba(201,168,76,0.4); transform:translateY(-2px); }
    .book-cover { height:160px; display:flex; align-items:center; justify-content:center; position:relative; }
    .book-cover svg { width:32px; height:32px; stroke:rgba(201,168,76,0.25); fill:none; stroke-width:1.2; }
    .cover-1{background:linear-gradient(145deg,#2A1870,#3E2A98);}
    .cover-2{background:linear-gradient(145deg,#0C1E1A,#163430);}
    .cover-3{background:linear-gradient(145deg,#260E38,#3E1858);}
    .cover-4{background:linear-gradient(145deg,#161640,#222260);}
    .cover-5{background:linear-gradient(145deg,#1A1008,#2E1E10);}
    .lang-badge { position:absolute; top:8px; right:8px; background:var(--gold); color:#160D42; font-size:8px; padding:3px 9px; border-radius:10px; font-weight:600; letter-spacing:1px; }
    .book-body { padding:10px 12px; background:rgba(18,10,56,0.95); }
    .book-title { font-size:12px; color:#fff; margin-bottom:6px; line-height:1.4; font-weight:400; }
    .book-prog-bar { height:2px; background:var(--border-purple); border-radius:2px; overflow:hidden; margin-bottom:4px; }
    .book-prog-fill { height:100%; background:linear-gradient(90deg,var(--gold),var(--gold-light)); border-radius:2px; }
    .book-meta { display:flex; justify-content:space-between; font-size:9px; color:rgba(255,255,255,0.5); }
    .book-pct { color:var(--gold); }

    /* EMPTY STATE */
    .empty-state { text-align:center; padding:4rem 1rem; }
    .empty-icon { width:56px; height:56px; border-radius:50%; background:rgba(42,26,106,0.3); border:0.5px solid var(--border-purple); display:flex; align-items:center; justify-content:center; margin:0 auto 1.2rem; }
    .empty-icon svg { width:24px; height:24px; stroke:rgba(160,140,200,0.4); fill:none; stroke-width:1.5; }
    .empty-title { font-family:'Cinzel',serif; font-size:14px; color:rgba(255,255,255,0.4); margin-bottom:0.6rem; letter-spacing:1px; }
    .empty-text { font-size:12px; color:rgba(255,255,255,0.25); line-height:1.7; max-width:260px; margin:0 auto 1.5rem; }
    .btn-explore { display:inline-block; padding:11px 24px; border-radius:6px; background:linear-gradient(135deg,var(--gold),var(--gold-light)); color:#160D42; font-size:10px; font-family:'Inter',sans-serif; letter-spacing:3px; cursor:pointer; text-transform:uppercase; font-weight:500; text-decoration:none; border:none; }

    /* REMOVE BTN */
    .book-remove { position:absolute; top:8px; left:8px; width:22px; height:22px; border-radius:50%; background:rgba(0,0,0,0.5); border:0.5px solid rgba(255,255,255,0.2); display:none; align-items:center; justify-content:center; cursor:pointer; transition:background 0.2s; }
    .book-card:hover .book-remove { display:flex; }
    .book-remove svg { width:10px; height:10px; stroke:#fff; fill:none; stroke-width:2; }
    .book-remove:hover { background:rgba(224,90,90,0.6); }

    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-track { background:var(--bg-deep); }
    ::-webkit-scrollbar-thumb { background:var(--border-purple); border-radius:2px; }
  </style>
</head>
<body>

  <nav>
    <div class="nav-left">
      <a class="nav-back" href="index.html"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></a>
      <a class="nav-logo" href="index.html">EDEN</a>
    </div>
    <div id="nav-user-area">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      </div>
    </div>
  </nav>

  <div id="loading"><div class="spinner"></div><div class="loading-text" id="label-loading">Chargement</div></div>

  <div id="not-signed-in">
    <div class="nsi-logo">EDEN</div>
    <div class="nsi-text" id="nsi-text">Connecte-toi pour accéder à ta bibliothèque personnelle.</div>
    <button class="google-btn" onclick="signInWithGoogle()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      <span id="nsi-btn">Continuer avec Google</span>
    </button>
  </div>

  <div id="main">
    <div class="page-title" id="page-title">Ma Bibliothèque</div>
    <div class="page-sub" id="page-sub">0 livre</div>

    <div class="tabs">
      <button class="tab on" id="tab-all" onclick="filterTab('all')">Tous</button>
      <button class="tab" id="tab-reading" onclick="filterTab('reading')">En cours</button>
      <button class="tab" id="tab-finished" onclick="filterTab('finished')">Terminés</button>
    </div>

    <div class="books-grid" id="books-grid"></div>
  </div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAHhYlri1s8EldAGRa7IaVr1vI_1R2Q0Lo",
      authDomain: "eden-christianstories-36fe6.firebaseapp.com",
      projectId: "eden-christianstories-36fe6",
      storageBucket: "eden-christianstories-36fe6.firebasestorage.app",
      messagingSenderId: "1051577294784",
      appId: "1:1051577294784:web:b62cb060b6909627e8f225"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();
    const covers = ['cover-1','cover-2','cover-3','cover-4','cover-5'];
    const bookSvg = `<svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>`;

    let _library = [];
    let _uid = null;

    function renderBooks(filter) {
      const t = window._bib_t;
      const grid = document.getElementById('books-grid');
      let books = _library;
      if (filter === 'reading') books = _library.filter(b => (b.progress||0) < 100);
      if (filter === 'finished') books = _library.filter(b => (b.progress||0) >= 100);

      if (books.length === 0) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column:1/-1;">
            <div class="empty-icon"><svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></div>
            <div class="empty-title">${t.empty_title}</div>
            <div class="empty-text">${t.empty_text}</div>
            <a class="btn-explore" href="index.html">${t.explore}</a>
          </div>`;
        return;
      }

      grid.innerHTML = books.map((book, i) => `
        <a class="book-card" href="livre.html?book=${book.id||'grace-desert'}">
          <div class="book-cover ${covers[i % covers.length]}">
            <div class="book-remove" onclick="removeBook(event,'${book.id}')">
              <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </div>
            <span class="lang-badge">${(book.lang||'FR').toUpperCase()}</span>
            ${bookSvg}
          </div>
          <div class="book-body">
            <div class="book-title">${book.title||'—'}</div>
            <div class="book-prog-bar"><div class="book-prog-fill" style="width:${book.progress||0}%"></div></div>
            <div class="book-meta">
              <span>${book.chapter||'—'}</span>
              <span class="book-pct">${book.progress||0}%</span>
            </div>
          </div>
        </a>`).join('');

      document.getElementById('page-sub').textContent = `${_library.length} ${_library.length <= 1 ? t.book : t.books}`;
    }

    window._removeBook = async (bookId) => {
      if (!_uid) return;
      _library = _library.filter(b => b.id !== bookId);
      await updateDoc(doc(db,"users",_uid), { library: _library });
      renderBooks(window._activeTab || 'all');
      document.getElementById('page-sub').textContent = `${_library.length} ${_library.length <= 1 ? window._bib_t.book : window._bib_t.books}`;
    };

    onAuthStateChanged(auth, async (user) => {
      document.getElementById('loading').style.display = 'none';
      if (user) {
        _uid = user.uid;
        document.getElementById('main').style.display = 'block';
        document.getElementById('not-signed-in').style.display = 'none';
        const navArea = document.getElementById('nav-user-area');
        if (user.photoURL) {
          navArea.innerHTML = `<a href="profil.html" class="nav-icon" style="padding:0;overflow:hidden;"><img src="${user.photoURL}" class="nav-avatar"/></a>`;
        } else {
          navArea.innerHTML = `<a href="profil.html" class="nav-icon" style="font-family:Cinzel,serif;font-size:12px;color:var(--gold);text-decoration:none;">${user.displayName?.[0]?.toUpperCase()||'U'}</a>`;
        }
        try {
          const snap = await getDoc(doc(db,"users",user.uid));
          if (snap.exists()) {
            _library = snap.data().library || [];
            renderBooks('all');
          }
        } catch(e) { console.error(e); }
      } else {
        document.getElementById('not-signed-in').style.display = 'flex';
      }
    });

    window._firebaseSignIn = () => signInWithPopup(auth, provider);
  </script>

  <script>
    // TRANSLATIONS
    const lang = localStorage.getItem('eden-lang') || 'fr';
    const T = {
      fr: {
        page_title:'Ma Bibliothèque', book:'livre', books:'livres',
        tab_all:'Tous', tab_reading:'En cours', tab_finished:'Terminés',
        empty_title:'Bibliothèque vide', explore:'Explorer les histoires',
        empty_text:'Tu n\'as pas encore ajouté de livre. Explore les histoires et ajoute tes préférées.',
        nsi_text:'Connecte-toi pour accéder à ta bibliothèque personnelle.',
        nsi_btn:'Continuer avec Google', loading:'Chargement'
      },
      es: {
        page_title:'Mi Biblioteca', book:'libro', books:'libros',
        tab_all:'Todos', tab_reading:'En curso', tab_finished:'Terminados',
        empty_title:'Biblioteca vacía', explore:'Explorar historias',
        empty_text:'Aún no has añadido ningún libro. Explora las historias y añade tus favoritas.',
        nsi_text:'Inicia sesión para acceder a tu biblioteca personal.',
        nsi_btn:'Continuar con Google', loading:'Cargando'
      },
      en: {
        page_title:'My Library', book:'book', books:'books',
        tab_all:'All', tab_reading:'Reading', tab_finished:'Finished',
        empty_title:'Empty library', explore:'Explore stories',
        empty_text:'You haven\'t added any books yet. Explore stories and add your favorites.',
        nsi_text:'Sign in to access your personal library.',
        nsi_btn:'Continue with Google', loading:'Loading'
      }
    };
    const t = T[lang] || T.fr;
    window._bib_t = t;
    window._activeTab = 'all';

    // Apply translations
    window.addEventListener('DOMContentLoaded', () => {
      document.getElementById('page-title').textContent = t.page_title;
      document.getElementById('tab-all').textContent = t.tab_all;
      document.getElementById('tab-reading').textContent = t.tab_reading;
      document.getElementById('tab-finished').textContent = t.tab_finished;
      document.getElementById('nsi-text').textContent = t.nsi_text;
      document.getElementById('nsi-btn').textContent = t.nsi_btn;
      document.getElementById('label-loading').textContent = t.loading;
    });

    function filterTab(tab) {
      window._activeTab = tab;
      document.querySelectorAll('.tab').forEach(b => b.classList.remove('on'));
      document.getElementById('tab-'+tab).classList.add('on');
      if (window._removeBook) renderBooks(tab);
    }

    function removeBook(e, bookId) {
      e.preventDefault();
      e.stopPropagation();
      if (window._removeBook) window._removeBook(bookId);
    }

    function signInWithGoogle() {
      if (window._firebaseSignIn) window._firebaseSignIn();
    }

    function renderBooks(filter) {
      if (window._removeBook) {
        // will be called by firebase module
      }
    }

    window.filterTab = filterTab;
    window.removeBook = removeBook;
    window.signInWithGoogle = signInWithGoogle;
  </script>
</body>
</html>
